<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - Workforce & Payroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}
    
    <div class="main-content">
        <div class="container-fluid">
            <div class="page-header">
                <h2><i class="fas fa-user-plus me-2"></i>Add Employee</h2>
                <p class="text-muted">Create a new employee profile</p>
            </div>
            
            <div class="content-card">
                <form method="POST" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name *</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number *</label>
                        <input type="tel" name="phone" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Role Type *</label>
                        <select name="role_type" class="form-select" required>
                            <option value="">Select Role</option>
                            <option value="Picking">Picking</option>
                            <option value="Put-away">Put-away</option>
                            <option value="Audit">Audit</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Store *</label>
                        <select name="store_id" class="form-select" required>
                            <option value="">Select Store</option>
                            {% for store in stores %}
                            <option value="{{ store.id }}">{{ store.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Date of Joining *</label>
                        <input type="date" name="date_of_joining" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Base Monthly Salary (₹) *</label>
                        <input type="number" name="base_monthly_salary" class="form-control" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="1"></textarea>
                    </div>
                    <div class="col-12">
                        <hr class="my-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Create Employee
                        </button>
                        <a href="{{ url_for('employees') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
